services:
  postgres:
    image: postgres:16
    container_name: dark_content_postgres
    environment:
      POSTGRES_DB: dark_content_radar
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
    ports:
      - "5433:5432"
    volumes:
      - dark_content_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d dark_content_radar"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - content_radar_net
    restart: unless-stopped

  backend:
    build: .
    container_name: dark_content_backend
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://radar:radar@postgres:5432/dark_content_radar
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - content_radar_net
    restart: unless-stopped

volumes:
  dark_content_postgres_data:

networks:
  content_radar_net:
    name: content_radar_net
    driver: bridge
