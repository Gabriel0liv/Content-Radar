services:
  postgres:
    image: postgres:16
    container_name: dark_content_postgres
    environment:
      POSTGRES_DB: dark_content_radar
      POSTGRES_USER: radar
      POSTGRES_PASSWORD: radar
    ports:
      - "5433:5432"
    volumes:
      - dark_content_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U radar -d dark_content_radar"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - content_radar_net
    restart: unless-stopped

  migrate:
    build: .
    container_name: dark_content_migrate
    command: alembic upgrade head
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://radar:radar@postgres:5432/dark_content_radar
      - CANVA_CLIENT_ID=${CANVA_CLIENT_ID:-}
      - CANVA_CLIENT_SECRET=${CANVA_CLIENT_SECRET:-}
      - CANVA_REDIRECT_URI=${CANVA_REDIRECT_URI:-}
      - CANVA_BASE_URL=${CANVA_BASE_URL:-https://api.canva.com/rest/v1}
      - CANVA_OAUTH_AUTHORIZE_URL=${CANVA_OAUTH_AUTHORIZE_URL:-https://www.canva.com/api/oauth/authorize}
      - CANVA_SCOPES=${CANVA_SCOPES:-design:content:write design:meta:read}
      - CANVA_ACCESS_TOKEN=${CANVA_ACCESS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - content_radar_net
    restart: "no"

  backend:
    build: .
    container_name: dark_content_backend
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://radar:radar@postgres:5432/dark_content_radar
      - N8N_SEARCH_WEBHOOK_URL=${N8N_SEARCH_WEBHOOK_URL:-}
      - CANVA_CLIENT_ID=${CANVA_CLIENT_ID:-}
      - CANVA_CLIENT_SECRET=${CANVA_CLIENT_SECRET:-}
      - CANVA_REDIRECT_URI=${CANVA_REDIRECT_URI:-}
      - CANVA_BASE_URL=${CANVA_BASE_URL:-https://api.canva.com/rest/v1}
      - CANVA_OAUTH_AUTHORIZE_URL=${CANVA_OAUTH_AUTHORIZE_URL:-https://www.canva.com/api/oauth/authorize}
      - CANVA_SCOPES=${CANVA_SCOPES:-design:content:write design:meta:read}
      - CANVA_ACCESS_TOKEN=${CANVA_ACCESS_TOKEN:-}
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - content_radar_net
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: dark_content_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    environment:
      - NEXT_PUBLIC_API_BASE_URL=http://localhost:8000
      - WATCHPACK_POLLING=true
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - content_radar_net
    restart: unless-stopped

volumes:
  dark_content_postgres_data:

networks:
  content_radar_net:
    name: content_radar_net
    driver: bridge
